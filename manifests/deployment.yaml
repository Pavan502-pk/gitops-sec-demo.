apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-vulnerable-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      containers:
      - name: web-app
        # We will use a public vulnerable node image for testing or build our own later
        image: node:14-alpine 
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "200m"
            memory: "128Mi"
