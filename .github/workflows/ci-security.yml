name: CI Security Scanning (SAST & SCA)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Run SAST and SCA Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Manual SonarQube Scan using raw CLI arguments
      - name: SonarQube Scan (SAST)
        run: |
          npm install -g sonar-scanner
          sonar-scanner \
            -Dsonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            -Dsonar.login="${{ secrets.SONAR_TOKEN }}" \
            -Dsonar.projectKey=gitops-sec-demo \
            -Dsonar.projectName=gitops-sec-demo \
            -Dsonar.sources=.

      # 2. Local SCA & IaC Scan via Trivy
      - name: Run Trivy Code SCA & Manifest Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'
