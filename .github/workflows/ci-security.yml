name: CI Security Scanning (SAST & SCA)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Run SAST and SCA Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Local SAST Scan (Finds the hardcoded AWS token & command injection in app.js)
      - name: Run Trivy Code SAST & Secret Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          format: 'table'
          exit-code: '0' # Keeps the pipeline passing so we can move to deployment phase
          severity: 'HIGH,CRITICAL'
