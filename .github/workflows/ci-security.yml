name: CI Security Scanning (SAST & SCA)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Run SAST and SCA Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better SonarQube analysis

      # 1. SAST Scan via SonarCloud / SonarQube
      - name: SonarCloud Scan (SAST)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Note: If your project/org keys differ, we can configure a sonar-project.properties file next

      # 2. SCA Scan via Trivy (Package Dependencies)
      - name: Run Trivy SCA Dependency Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0' # Keep it 0 for now so the pipeline finishes, we will see the errors in logs
          severity: 'HIGH,CRITICAL'
